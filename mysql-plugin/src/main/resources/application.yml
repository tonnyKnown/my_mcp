server:
  port: ${SERVER_PORT:8083}

spring:
  config:
    import:
      - optional:file:./.env[.properties]
      - optional:file:./application-local.yml
  application:
    name: mysql-mcp-server
  main:
    web-application-type: reactive
    banner-mode: off
  ai:
    mcp:
      server:
        name: mysql-mcp-server
        version: 1.0.0
        type: SYNC
        instructions: "MySQL MCP 服务，提供数据库查询和操作功能。注意：修改订单状态请使用 updateOrderStatus 工具，不要使用 SQL 直接操作"
        sse-endpoint: /mcp/sse
    alibaba:
      mcp:
        nacos:
          server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
          namespace: ${NACOS_NAMESPACE:public}
          username: ${NACOS_USERNAME:nacos}
          password: ${NACOS_PASSWORD:nOn2h1l8cHSG}
          register:
            enabled: ${MCP_NACOS_REGISTER_ENABLED:false}

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/example_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:your_actual_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 600000

logging:
  level:
    com.example.mysql: DEBUG
